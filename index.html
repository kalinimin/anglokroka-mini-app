<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>АнглоКроха Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --tg-bg: var(--tg-theme-bg-color, #ffffff);
      --tg-text: var(--tg-theme-text-color, #1a1a1a);
      --tg-hint: var(--tg-theme-hint-color, #999999);
      --tg-link: var(--tg-theme-link-color, #2678b6);
      --tg-btn: var(--tg-theme-button-color, #2678b6);
      --tg-btn-text: var(--tg-theme-button-text-color, #ffffff);
      --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--tg-bg);
      color: var(--tg-text);
      min-height: 100vh;
      padding: 20px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      text-align: center;
      padding: 24px 0 32px;
    }

    .header .emoji {
      font-size: 56px;
      margin-bottom: 12px;
      animation: bounce 1s ease-in-out;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      40% { transform: translateY(-16px); }
      60% { transform: translateY(-8px); }
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 14px;
      color: var(--tg-hint);
    }

    .card {
      background: var(--tg-secondary-bg);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--tg-hint);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
    }

    .info-row:not(:last-child) {
      border-bottom: 1px solid rgba(128, 128, 128, 0.1);
    }

    .info-label {
      font-size: 15px;
      color: var(--tg-hint);
    }

    .info-value {
      font-size: 15px;
      font-weight: 500;
      text-align: right;
      max-width: 60%;
      word-break: break-word;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--tg-btn);
      color: var(--tg-btn-text);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .status-badge .dot {
      width: 6px;
      height: 6px;
      background: var(--tg-btn-text);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .action-btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: var(--tg-btn);
      color: var(--tg-btn-text);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: opacity 0.2s;
    }

    .action-btn:active {
      opacity: 0.7;
    }

    .platform-info {
      text-align: center;
      padding: 16px;
      color: var(--tg-hint);
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="emoji">🐣</div>
    <h1>АнглоКроха</h1>
    <p>Mini App работает!</p>
  </div>

  <div class="card">
    <div class="card-title">Пользователь</div>
    <div id="user-info">
      <div class="info-row">
        <span class="info-label">Имя</span>
        <span class="info-value" id="user-name">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Username</span>
        <span class="info-value" id="user-username">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">ID</span>
        <span class="info-value" id="user-id">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Язык</span>
        <span class="info-value" id="user-lang">—</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Информация о платформе</div>
    <div class="info-row">
      <span class="info-label">Платформа</span>
      <span class="info-value" id="platform">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Версия</span>
      <span class="info-value" id="version">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Тема</span>
      <span class="info-value" id="color-scheme">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Статус</span>
      <span class="status-badge"><span class="dot"></span> Подключено</span>
    </div>
  </div>

  <button class="action-btn" onclick="handleClose()">
    Закрыть приложение
  </button>

  <div class="platform-info">
    initData: <span id="has-init-data">проверяем...</span>
  </div>

  <script>
    const tg = window.Telegram.WebApp;

    // Сообщаем Telegram что приложение готово
    tg.ready();

    // Раскрываем на весь экран
    tg.expand();

    // Заполняем данные пользователя
    const user = tg.initDataUnsafe?.user;

    if (user) {
      document.getElementById('user-name').textContent =
        [user.first_name, user.last_name].filter(Boolean).join(' ');
      document.getElementById('user-username').textContent =
        user.username ? '@' + user.username : 'не указан';
      document.getElementById('user-id').textContent = user.id;
      document.getElementById('user-lang').textContent =
        user.language_code || 'не указан';
    } else {
      document.getElementById('user-name').textContent = 'Откройте из Telegram';
    }

    // Информация о платформе
    document.getElementById('platform').textContent = tg.platform || 'unknown';
    document.getElementById('version').textContent = tg.version || 'unknown';
    document.getElementById('color-scheme').textContent = tg.colorScheme || 'unknown';
    document.getElementById('has-init-data').textContent =
      tg.initData ? `✅ ${tg.initData.length} символов` : '❌ нет данных';

    // Кнопка закрытия
    function handleClose() {
      tg.close();
    }
  </script>

</body>
</html>
